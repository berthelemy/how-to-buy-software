name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # Updated to v4 for better reliability
      - uses: actions/checkout@v4

      - name: Use Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' # Upgrade to the current standards cache-related

      - name: build game
        run: |
          # 1. Download the pre-compiled Tweego binary (Linux 64-bit)
          # Using curl to grab the release directly avoids all Go module version errors
          curl -L https://github.com/tmedwards/tweego/releases/download/v2.1.1/tweego-2.1.1-linux-x64.zip -o tweego.zip
          
          # 2. Unzip it
          unzip tweego.zip
          chmod +x tweego
          
          # 3. Create the output directory
          mkdir -p dist
          
          # 4. Run the local binary
          ./tweego story.twee -o dist/index.html

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4 # Updated to v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist