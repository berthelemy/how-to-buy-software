name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes the Node.js deprecation warning
    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # Check if v5 or v6 is released

      - name: build game
        run: |
          # 1. Download and Unzip Tweego
          curl -L https://github.com/tmedwards/tweego/releases/download/v2.1.1/tweego-2.1.1-linux-x64.zip -o tweego.zip
          unzip -o tweego.zip
          chmod +x tweego
          
          # 2. Create the output directory
          mkdir -p dist
          
          # 3. Tell Tweego where your repo's storyformats are
          # This points to the hidden folder in your repository
          export TWEEGO_PATH=$(pwd)/.storyformats
          
          # 4. Run the build
          # Tweego will now look inside .storyformats and find sugarcube-2-37-3
          ./tweego src -o dist/index.html

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4 # Updated to v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist