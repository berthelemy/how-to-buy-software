name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      # Updated to v4 for better reliability
      - uses: actions/checkout@v4

      - name: Use Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: '1.26' # Upgrade to the current standards cache-related

      - name: build game
        run: |
          # Disable module mode temporarily to install this legacy package
          GO111MODULE=off go get -v github.com/tmedwards/tweego
          
          # Map the path
          GOBIN=$(go env GOPATH)/bin
          
          # Create output dir
          mkdir -p dist
          
          # Run the build
          $GOBIN/tweego story.twee -o dist/index.html

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4 # Updated to v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist